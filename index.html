<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教學材料 - SPE 倉庫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }
        
        .description {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .file-list {
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 18px;
            color: #667eea;
            font-weight: 600;
            margin-top: 25px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #667eea;
            margin-right: 10px;
            border-radius: 2px;
        }
        
        .file-items {
            display: grid;
            gap: 12px;
        }
        
        .file-item {
            padding: 15px 20px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        
        .file-item:hover {
            background: #f0f3ff;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }
        
        .file-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .file-item a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .file-item a::before {
            content: '📄';
            font-size: 18px;
        }
        
        .file-info {
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }
        
        .loading {
            color: #666;
            font-style: italic;
            padding: 20px;
            text-align: center;
        }
        
        .error {
            color: #e74c3c;
            padding: 20px;
            background: #fadbd8;
            border-radius: 5px;
            border-left: 4px solid #e74c3c;
        }
        
        .empty {
            color: #999;
            padding: 20px;
            text-align: center;
            background: #f8f9fa;
            border-radius: 5px;
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 教學材料</h1>
        <p class="description">SPE 倉庫 - 自動索引所有 HTML 檔案</p>
        
        <div class="file-list">
            <div class="section-title">可用的教材</div>
            <div id="htmlFiles" class="file-items">
                <div class="loading">⏳ 正在加載文件列表...</div>
            </div>
        </div>
        
        <div class="footer">
            <p>此頁面自動從 GitHub 倉庫掃描 HTML 檔案</p>
            <p><a href="https://github.com/goodfishilc/spe" target="_blank">查看倉庫</a></p>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'goodfishilc';
        const REPO_NAME = 'spe';
        const GITHUB_BASE = 'https://github.com';
        const PAGES_BASE = 'https://goodfishilc.github.io/spe';
        
        async function fetchHTMLFiles() {
            const container = document.getElementById('htmlFiles');
            
            try {
                // 使用 GitHub API 獲取倉庫內容
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/main?recursive=1`,
                    {
                        headers: {
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // 篩選所有 HTML 檔案（排除 index.html）
                const htmlFiles = data.tree
                    .filter(item => 
                        item.type === 'blob' && 
                        item.path.endsWith('.html') && 
                        item.path !== 'index.html'
                    )
                    .sort((a, b) => a.path.localeCompare(b.path));
                
                if (htmlFiles.length === 0) {
                    container.innerHTML = '<div class="empty">📭 目前倉庫中沒有 HTML 檔案</div>';
                    return;
                }
                
                // 生成 HTML 檔案列表
                container.innerHTML = htmlFiles.map(file => {
                    const filePath = file.path;
                    const fileName = filePath.split('/').pop();
                    const pageUrl = `${PAGES_BASE}/${filePath}`;
                    const repoUrl = `${GITHUB_BASE}/${REPO_OWNER}/${REPO_NAME}/blob/main/${filePath}`;
                    
                    return `
                        <div class="file-item">
                            <a href="${pageUrl}" target="_blank">${filePath}</a>
                            <div class="file-info">
                                <a href="${repoUrl}" target="_blank" style="color: #999; font-size: 12px;">在 GitHub 上查看</a>
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Error fetching files:', error);
                container.innerHTML = `
                    <div class="error">
                        ❌ 無法加載文件列表：${error.message}
                    </div>
                `;
            }
        }
        
        // 頁面加載完成後獲取文件
        document.addEventListener('DOMContentLoaded', fetchHTMLFiles);
    </script>
</body>
</html>
