<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>看圖選詞小遊戲（含造句提示）</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; }
        .menu-container {
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        select {
            font-size: 1.2rem;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .game-box {
            background-color: white;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .image-container {
            width: 100%;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fafafa;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        /* 🔧 句子提示區樣式 */
        .sentence-hint {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
            background-color: #fff9db;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #fcc419;
            letter-spacing: 2px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .btn-option {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px;
            background-color: #e1f5fe;
            border: 2px solid #0288d1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-option:hover {
            background-color: #b3e5fc;
        }
        .btn-correct {
            background-color: #c8e6c9 !important;
            border-color: #388e3c !important;
            color: #2e7d32;
        }
        .btn-wrong {
            background-color: #ffcdd2 !important;
            border-color: #d32f2f !important;
            color: #c62828;
            opacity: 0.6;
        }
        .score-board {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #555;
        }
        .next-btn {
            margin-top: 15px;
            font-size: 1.2rem;
            padding: 10px 20px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <h1>🎯 看圖讀句選生字</h1>

    <div class="menu-container">
        <label for="lesson-select">請選擇課數：</label>
        <select id="lesson-select" onchange="changeLesson()">
            </select>
    </div>

    <div class="game-box">
        <div class="image-container">
            <img id="question-image" src="" alt="題目圖片資料載入中...">
        </div>

        <div class="sentence-hint" id="question-sentence">
            句子載入中...
        </div>

        <div class="options-grid" id="options-container">
            </div>

        <div class="score-board" id="feedback">載入中...</div>
        <button class="next-btn" id="next-button" onclick="nextQuestion()">下一題 ➡️</button>
    </div>

<script>
// ==================== 🎯 核心詞庫設定區 ====================
// 已經幫老師加入造句欄位 (sentence)，網頁會自動把句子中的 answer 替換成 "＿＿＿＿"
const wordBank = {
    "第十一課：小讀者樂園": [
        { image: "https://goodfishilc.github.io/spe/11圖書館.png", answer: "圖書館", sentence: "我去圖書館借書。" },
        { image: "https://goodfishilc.github.io/spe/11世界.png", answer: "參加", sentence: "我參加學校的比賽。" },
        { image: "https://goodfishilc.github.io/spe/11世界.png", answer: "題目", sentence: "這個題目需要仔細想一想。" }, 
        { image: "https://goodfishilc.github.io/spe/11世界.png", answer: "士兵", sentence: "勇敢的士兵守護著家園。" },
        { image: "https://goodfishilc.github.io/spe/11讚美.png", answer: "讚美", sentence: "老師讚美我的進步。" }, 
        { image: "https://goodfishilc.github.io/spe/11甲蟲.png", answer: "甲蟲", sentence: "我看見一隻甲蟲。" },
        { image: "https://goodfishilc.github.io/spe/11形狀.png", answer: "外形", sentence: "這片葉子的形狀像一顆心。" }, 
        { image: "https://goodfishilc.github.io/spe/11志氣.png", answer: "志氣", sentence: "他很有志氣，想努力完成夢想。" },
        { image: "https://goodfishilc.github.io/spe/11世界.png", answer: "約定", sentence: "我和朋友約定明天一起讀書。" }, 
        { image: "https://goodfishilc.github.io/spe/11數字.png", answer: "數字", sentence: "妹妹正在練習寫數字。" }, 
        { image: "https://goodfishilc.github.io/spe/11歡迎.png", answer: "歡迎", sentence: "大家歡迎新同學。" },
        { image: "https://goodfishilc.github.io/spe/11交通.png", answer: "交通", sentence: "上學時間，校門口的交通很忙。" },
        { image: "https://goodfishilc.github.io/spe/11口令.png", answer: "口令", sentence: "老師一喊口令，大家就排好隊。" }, 
        { image: "https://goodfishilc.github.io/spe/11世界.png", answer: "世界", sentence: "書本帶我認識更大的世界。" },
        { image: "https://goodfishilc.github.io/spe/11世界.png", answer: "界線", sentence: "打羽球不可以超出界線。" }, 
        { image: "https://goodfishilc.github.io/spe/11圖畫.png", answer: "圖畫", sentence: "我把圖畫掛在牆上。" }, 
        { image: "https://goodfishilc.github.io/spe/11探索.png", answer: "探索", sentence: "我們一起探索大自然。" },
        { image: "https://goodfishilc.github.io/spe/11奥妙.png", answer: "奥秒", sentence: "星空裡有許多奧妙。" }, 
        { image: "https://goodfishilc.github.io/spe/11危險.png", answer: "危險", sentence: "馬路上玩球很危險。" }, 
        { image: "https://goodfishilc.github.io/spe/11車庫.png", answer: "車庫", sentence: "爸爸把車子開進車庫。" } 
    ]
};

// 所有詞庫中出現過的詞彙，用來當作「錯誤選項」的機率庫
const allWords = Object.values(wordBank).flat().map(item => item.answer);

// ==================== ⚙️ 遊戲邏輯控制區 ====================
let currentLesson = "";
let currentQuestions = [];
let currentIndex = 0;
let currentCorrectAnswer = "";
let hasAnswered = false;

// 初始化：建立課數選單
const lessonSelect = document.getElementById("lesson-select");
Object.keys(wordBank).forEach(lesson => {
    let option = document.createElement("option");
    option.value = lesson;
    option.textContent = lesson;
    lessonSelect.appendChild(option);
});

// 切換課數
function changeLesson() {
    currentLesson = lessonSelect.value;
    // 複製該課題目並隨機打亂
    currentQuestions = [...wordBank[currentLesson]].sort(() => Math.random() - 0.5);
    currentIndex = 0;
    loadQuestion();
}

// 載入題目
function loadQuestion() {
    hasAnswered = false;
    document.getElementById("next-button").style.display = "none";
    document.getElementById("feedback").textContent = `目前進度：${currentIndex + 1} / ${currentQuestions.length}`;

    let currentQ = currentQuestions[currentIndex];
    currentCorrectAnswer = currentQ.answer;

    // 1. 顯示圖片
    document.getElementById("question-image").src = currentQ.image;

    // 2. 顯示克漏字句子
    // 用系統自動判斷，把句子中的正確答案文字，替換成 "＿＿＿＿"
    // 同時也防呆：如果句子中有相似字，也會一併處理
    let displaySentence = currentQ.sentence;
    
    // 如果句子裡有完整對應的詞就替換，沒有的話就嘗試替換前兩個字或關聯字
    if (displaySentence.includes(currentCorrectAnswer)) {
        displaySentence = displaySentence.replace(currentCorrectAnswer, "＿＿＿＿");
    } else {
        // 特殊防呆：處理原造句中字詞些許不同的情況（如 奧妙->奧秘、題目->主題、形狀->外形）
        let fallbackWords = ["危險", "車庫", "探索", "奧妙", "進步", "形狀", "志氣", "數字", "歡迎", "交通", "口令", "世界", "甲蟲", "界線", "約定", "圖畫", "圖書館"];
        fallbackWords.forEach(w => {
            if (currentQ.sentence.includes(w)) {
                displaySentence = displaySentence.replace(w, "＿＿＿＿");
            }
        });
    }
    document.getElementById("question-sentence").textContent = displaySentence;

    // 3. 產生選項（1個對的 + 3個隨機錯的）
    let options = [currentCorrectAnswer];
    
    // 篩選出非正確答案的其他詞彙
    let wrongPool = allWords.filter(word => word !== currentCorrectAnswer);
    wrongPool.sort(() => Math.random() - 0.5);
    
    // 取前三個錯誤詞彙
    for(let i=0; i<3; i++) {
        if(wrongPool[i]) {
            options.push(wrongPool[i]);
        } else {
            options.push("備用詞彙" + (i+1));
        }
    }

    // 打亂四個選項的順序
    options.sort(() => Math.random() - 0.5);

    // 渲染按鈕
    const container = document.getElementById("options-container");
    container.innerHTML = ""; 

    options.forEach(word => {
        let btn = document.createElement("button");
        btn.className = "btn-option";
        btn.textContent = word;
        btn.onclick = () => checkAnswer(btn, word);
        container.appendChild(btn);
    });
}

// 檢查答案
function checkAnswer(selectedBtn, selectedWord) {
    if (hasAnswered) return; 
    hasAnswered = true;

    const buttons = document.querySelectorAll(".btn-option");
    
    if (selectedWord === currentCorrectAnswer) {
        selectedBtn.classList.add("btn-correct");
        document.getElementById("feedback").textContent = "⭕ 太棒了！答對了！";
        
        // 答對時，把原本挖空的句子還原，讓學生看完整的正確造句
        let currentQ = currentQuestions[currentIndex];
        document.getElementById("question-sentence").textContent = currentQ.sentence;
    } else {
        selectedBtn.classList.add("btn-wrong");
        document.getElementById("feedback").textContent = "❌ 沒關係，再試試看！";
        buttons.forEach(btn => {
            if(btn.textContent === currentCorrectAnswer) {
                btn.classList.add("btn-correct");
            }
        });
    }

    document.getElementById("next-button").style.display = "inline-block";
}

// 下一題
function nextQuestion() {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
        loadQuestion();
    } else {
        document.getElementById("options-container").innerHTML = "";
        document.getElementById("question-image").src = "";
        document.getElementById("question-sentence").textContent = "🎉 恭喜完成本課所有練習！";
        document.getElementById("feedback").textContent = "老師和同學都辛苦囉！";
        document.getElementById("next-button").style.display = "none";
    }
}

// 自動執行
changeLesson();
</script>

</body>
</html>
